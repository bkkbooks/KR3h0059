body:
  text: 南陽書畫表卷上明張丑撰法書原夫書法之興肇自倉頡而衍溢乎史籀詳備乎李斯程邈之徒並稱業擅一時足可法程萬世然以世代綿逺真迹無存鑒家僅于金石遺文略窺一斑而已厥後人趨簡便篆𨽻之用日微而書始分為三體矣三體維何一曰正書始于王次仲而鍾繇造其極遞變而為王僧虔褚遂良顔真卿柳公權以迄乎徐浩陸希聲宋綬蔡襄二曰行狎起于劉德升而羲獻父子窮其奧遞變而為王濛謝安陶宏景永僧法極以迄乎虞世南李雍蘇軾米芾三曰草聖創法于杜度而張芝皇象得其神遞變而為索靖庾翼蕭子雲阮研以迄乎旭張伯髙素僧藏真楊凝式趙孟俯咸能上下千年縱橫萬里鑒家珍若隋珠重如拱璧或稱人文之大觀或號藝林之巨擘揆諸風格良不誣也國寶流傳實賴好事厥後梁武唐文宋高元文金章李煜則以帝主之尊而酷嗜夫寶書亦有紹京廣津易簡公麟托胄似道則以碩輔之雄而爭收夫法墨波蕩風靡浸淫成俗無奈真贋雜陳玉石並列求彼真鑒如貞白登善元章元鎮之研窮顛末洞見底裏者則且代不數人億不得一也職書之任厥惟艱哉皇明建極百務聿興而獨鑒書一塗茅塞未闢世廟時有豫章權相者沉緬金珠浮遊雅道百計苞苴一味耳食何異坐井觀天刻舟求劍歟嗣後二美元美敬美博訪于婁東子京力購于秀水一時故楮斷麻雲興霞聚商榷精奧閴其無人誰能熟玩名書深加精别者也維時韓存良太史以妙年登甲科位帝師爵元老興滅繼絶人文攸係生平别無嗜好絶意求田問舍事俸薪所入悉市寶章晉唐宋元之竒所收不下百本多與名流韻士品定甲乙軸軸連城言言蓍蔡而長公朝延以余耿尚時接討論瓌寶在陳剖腹無計乃以暇日即其家書迹目録作為法書表行世縱未敢自稱鑒家之董狐竊附子長年表之例云爾右方凡二十五人計七十二件南陽書畫表卷上
