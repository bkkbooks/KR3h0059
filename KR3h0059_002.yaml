body:
  text: 南陽書畫表卷下明張丑撰名畫張子曰畫者挂也義取挂萬象以垂世也上古史皇創為斯伎以教韻士嗣後興廢靡常漫滅微不可考下逮曹魏始有曹弗興兵符圖一卷流傳于世而道釋人物山水界畫花果鳥獸蟲魚墨戲諸科以次代興矣遐稽魏晉以來道釋則顧愷之陸探微張僧繇吳道玄人物則展子虔閻立本周昉李公麟山水則荆浩關同董源巨僧巨然燕肅趙孟俯黃公望王蒙界畫則王維李思訓尹繼昭郭忠恕花果鳥獸則邊鸞黃筌韓幹戴嵩蟲魚墨戲則顧野王滕滕王元嬰徐熙易元吉鄭虔米芾高克恭倪瓚斯皆羅萬象于胸襟粹千竒于毫素者也故俊傑之士尚友之英淵識博聞熟究精鑒往往著書立論以寄幽情有若齊梁畫目貞觀公私畫録宣和畫譜紹興祕閣畫史雲煙過眼録嚴氏書畫記諸篇卓卓表見于世的為藝苑名言髙賢定論豈如盲人觀場妄肆雌黃之口曾未涉川遽云越海俄觀魚鱉謂察蛟龍畢世望洋致慨千秋貽笑大方者乎夫名畫者蓋以窮天地所未至顯日月所不照揮纖毫之筆則萬象由心展方寸之能而千里在掌自非慧心具目之彥博識宏議之儒胡能披沙揀金拔十得一也鑒畫之難如此故曩哲時有志者非惟自勵又以勵人苦心哉若人與丑間居研究把臂晤言每以斯事質之韓朝延氏朝延喟然而歎曰書畫式微真賞難遇八法六長之奧世人不講久矣此道荆榛孰闢康莊披雲霧睹青天非吾子其誰與歸在昔先太史博求名書反覆諦玩心領神會上契往哲種種不傳之祕賴吾子法書表行差堪為識者吐氣第先太史旁耽畫癖亦復不減書淫前後所收名畫神品何啻數百丹青墨戲並是甲觀自余南北宦遊不便提挈日亡月逸雨散風飄遂至遺失數多零落殆盡俯仰今昔感慨係之豈止開厨或失挂壁飛去而已耶追維先太史之勤收力購馴至璧合珠聨曾未再傳盡屬烏有當吾世而失之不腆實有歉焉追理畫目十忘七八聊且為我表之并授副墨之子連衡並驅光前耀後邀惠故人德不淺矣丑感朝延之言願附名以垂不朽于是續撰南陽名畫表右方凡四十七人計九十五圖南陽書畫表卷下
  hash: sha256:6f5b8b79c5a27b08e329bc3c86a4946f5a4e92bd154be123cbace8c8c30aae73
