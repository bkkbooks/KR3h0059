body:
  text: 南陽書畫表藝術類一書畫之屬提要臣等謹案南陽法書表一卷南陽名畫表一卷明張丑撰所列皆韓世能家收藏真迹法書表凡作者二十七人計七十二件分五格上為時代下以正書行狎草聖石刻四等各為一格名畫表凡作者四十七人計九十五圖亦分五格上為時代而下以道釋人物為一格山水界畫為一格花果鳥獸為一格蟲魚墨戲為一格例又小别二表前皆有丑自序蓋先表法書既而世能之子朝延併屬兼表名畫也世能字存良長洲人隆慶時進士官至禮部尚書喜收名迹董其昌洛神賦跋所稱館師韓宗伯者是也其稱南陽者韓氏郡望南陽猶韓維之稱南陽集耳乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a35379247eefe5a060abb367ba60c98c03c57c90b4df4065059436262771df7d
